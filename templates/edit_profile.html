<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование профиля</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='defaults/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='uploads/favicon.png') }}">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">LinkA</div>
                <div class="user-info">
                    <div class="user-welcome">
                        <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <div class="sidebar-left">
                <h3>Меню</h3>
                <ul>
                    <li><a href="/profile"><i class="fas fa-user-circle"></i> Мой профиль</a></li>
                    <li><a href="/friends"><i class="fas fa-users"></i> Друзья</a></li>
                    <li><a href="/find_friends"><i class="fas fa-search"></i> Найти друзей</a></li>
                    <li><a href="/my_posts"><i class="fas fa-newspaper"></i> Мои посты</a></li>
                    <li><a href="/groups"><i class="fas fa-layer-group"></i> Группы</a></li>
                    <li><a href="/home"><i class="fas fa-home"></i> Главная</a></li>
                </ul>
            </div>

            <div class="feed">
                <div class="card" style="padding:28px;">
                    <a href="/profile" class="back-link" style="display:inline-flex;margin-bottom:20px;">
                        <i class="fas fa-arrow-left"></i>&nbsp; Назад к профилю
                    </a>
                    <h2 style="font-family:var(--font-display);font-size:18px;margin-bottom:24px;">
                        <i class="fas fa-user-edit" style="color:var(--amber-500);"></i> Редактирование профиля
                    </h2>

                    {% if profile and profile.avatar %}
                    <div style="margin-bottom:20px;">
                        <p style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">Текущая аватарка:</p>
                        <img src="{{ url_for('static', filename='uploads/avatars/' + profile.avatar) }}"
                             alt="Аватарка"
                             style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--amber-300);"
                             onerror="this.src='/static/defaults/for_users.png'">
                    </div>
                    {% endif %}

                    <form method="POST" action="/profile/edit" enctype="multipart/form-data">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-camera" style="color:var(--amber-500);"></i> Новая аватарка
                            </label>
                            <input type="file" name="avatar" accept=".jpg,.jpeg,.png,.gif" class="form-control">
                            <small style="color:var(--text-muted);font-size:12px;display:block;margin-top:4px;">
                                JPG, PNG, GIF — не более 2 МБ
                            </small>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-id-card" style="color:var(--amber-500);"></i> ФИО
                            </label>
                            <input type="text" name="full_name"
                                   value="{{ profile.full_name if profile else '' }}"
                                   class="form-control"
                                   placeholder="Введите ваше полное имя">
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-align-left" style="color:var(--amber-500);"></i> О себе
                            </label>
                            <textarea name="bio" class="form-control"
                                      placeholder="Расскажите о себе...">{{ profile.bio if profile else '' }}</textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-map-marker-alt" style="color:var(--amber-500);"></i> Местоположение
                            </label>
                            <input type="text" name="location"
                                   value="{{ profile.location if profile else '' }}"
                                   class="form-control"
                                   placeholder="Город, страна">
                        </div>

                        <div style="display:flex;gap:10px;">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Сохранить изменения
                            </button>
                            <a href="/profile" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
