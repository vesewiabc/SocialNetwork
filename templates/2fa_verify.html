<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение входа</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1877f2 0%, #42b2f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,.18);
            max-width: 420px;
            width: 100%;
            padding: 40px 36px;
            text-align: center;
        }

        .shield-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #1877f2, #42b2f5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 14px rgba(24,119,242,.3);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1c1e21;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #65676b;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .subtitle strong {
            color: #2AABEE;
        }

        /* Поле ввода кода */
        .code-input-wrapper {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .code-input-wrapper input {
            width: 48px;
            height: 56px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            color: #1c1e21;
        }
        .code-input-wrapper input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 3px rgba(24,119,242,.15);
        }
        .code-input-wrapper input.filled {
            border-color: #42b72a;
            background: #f0faf0;
        }

        /* Скрытое общее поле (fallback) */
        #hidden-code {
            display: none;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #1877f2;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, transform .1s;
            margin-bottom: 14px;
        }
        .btn-primary:hover { background: #1558b0; }
        .btn-primary:active { transform: scale(.97); }
        .btn-primary:disabled { background: #a0b4f5; cursor: not-allowed; }

        .error-msg {
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .resend-section {
            font-size: 13px;
            color: #65676b;
            margin-bottom: 16px;
        }

        #resend-btn {
            background: none;
            border: none;
            color: #1877f2;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            padding: 0;
        }
        #resend-btn:hover { text-decoration: underline; }
        #resend-btn:disabled { color: #aaa; cursor: not-allowed; text-decoration: none; }

        #resend-status {
            font-size: 13px;
            margin-top: 4px;
            min-height: 18px;
        }
        #resend-status.ok   { color: #1a6e22; }
        #resend-status.fail { color: #c0392b; }

        .logout-link {
            font-size: 13px;
            color: #65676b;
        }
        .logout-link a {
            color: #c0392b;
            text-decoration: none;
        }
        .logout-link a:hover { text-decoration: underline; }

        .timer-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="shield-icon">🔐</div>
    <h1>Подтверждение входа</h1>
    <p class="subtitle">
        Мы отправили 6-значный код в ваш <strong>Telegram</strong>.<br>
        Введите его ниже для входа.
    </p>

    <div class="timer-badge" id="timer">⏱ Код действует 5 минут</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/2fa/verify" id="verify-form">
        <!-- Отображаемые одиночные поля -->
        <div class="code-input-wrapper" id="digit-boxes">
            <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        </div>
        <!-- Скрытое поле, куда собирается полный код -->
        <input type="hidden" name="code" id="hidden-code">
        <button type="submit" class="btn-primary" id="submit-btn" disabled>Подтвердить</button>
    </form>

    <div class="resend-section">
        Не получили код?
        <button id="resend-btn" onclick="resendCode()">Отправить снова</button>
    </div>
    <div id="resend-status"></div>
    <br>
    <div class="logout-link">
        <a href="/login">← Вернуться к странице входа</a>
    </div>
</div>

<script>
const digits = document.querySelectorAll('.digit');
const hiddenCode = document.getElementById('hidden-code');
const submitBtn = document.getElementById('submit-btn');

// Автопереход между ячейками
digits.forEach((input, i) => {
    input.addEventListener('input', (e) => {
        // Оставляем только цифры
        input.value = input.value.replace(/\D/g, '').slice(-1);
        if (input.value) {
            input.classList.add('filled');
            if (i < digits.length - 1) digits[i + 1].focus();
        } else {
            input.classList.remove('filled');
        }
        updateHidden();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) {
            digits[i - 1].focus();
            digits[i - 1].value = '';
            digits[i - 1].classList.remove('filled');
            updateHidden();
        }
    });

    // Вставка из буфера (6 цифр сразу)
    input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (pasted.length === 6) {
            digits.forEach((d, idx) => {
                d.value = pasted[idx] || '';
                d.classList.toggle('filled', !!d.value);
            });
            updateHidden();
            digits[5].focus();
        }
    });
});

function updateHidden() {
    const code = Array.from(digits).map(d => d.value).join('');
    hiddenCode.value = code;
    submitBtn.disabled = code.length !== 6;
}

// Таймер обратного отсчёта
let seconds = 300; // 5 минут
const timerEl = document.getElementById('timer');
const interval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
        clearInterval(interval);
        timerEl.textContent = '⏱ Код истёк';
        timerEl.style.background = '#fdecea';
        timerEl.style.color = '#c0392b';
        timerEl.style.borderColor = '#e74c3c';
        submitBtn.disabled = true;
        return;
    }
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    timerEl.textContent = `⏱ Осталось ${m}:${s.toString().padStart(2,'0')}`;
}, 1000);

// Повторная отправка
let resendCooldown = 0;
async function resendCode() {
    if (resendCooldown > 0) return;
    const btn = document.getElementById('resend-btn');
    const status = document.getElementById('resend-status');
    btn.disabled = true;
    status.textContent = '';

    try {
        const resp = await fetch('/2fa/resend', { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
            status.textContent = '✅ Код отправлен повторно!';
            status.className = 'ok';
            // Сбрасываем таймер
            seconds = 300;
        } else {
            status.textContent = '❌ ' + (data.error || 'Не удалось отправить');
            status.className = 'fail';
        }
    } catch(e) {
        status.textContent = 'Ошибка соединения';
        status.className = 'fail';
    }

    // Кулдаун 30 секунд
    resendCooldown = 30;
    const coolTimer = setInterval(() => {
        resendCooldown--;
        btn.textContent = resendCooldown > 0 ? `Отправить снова (${resendCooldown}с)` : 'Отправить снова';
        if (resendCooldown <= 0) {
            clearInterval(coolTimer);
            btn.disabled = false;
        }
    }, 1000);
}

// Фокус на первое поле при загрузке
digits[0].focus();
</script>
</body>
</html>
