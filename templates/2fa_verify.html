<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение входа — LinkA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='defaults/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='uploads/favicon.png') }}">
    <style>
        body {
            background: var(--bg-page);
        }
        .verify-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 16px 60px;
        }

        .verify-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .verify-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--accent-gradient);
        }

        .verify-header {
            padding: 36px 36px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .verify-icon-wrap {
            width: 72px; height: 72px;
            background: var(--amber-100);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            margin: 0 auto 18px;
            border: 3px solid var(--amber-300);
            color: var(--amber-600);
        }

        .verify-title {
            font-family: var(--font-display);
            font-size: 18px; font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .verify-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .verify-subtitle strong { color: var(--amber-700); }

        .verify-body { padding: 28px 36px 32px; }

        /* Таймер */
        .timer-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--amber-50);
            color: var(--amber-700);
            border: 1px solid var(--amber-300);
            border-radius: var(--radius-full);
            padding: 5px 14px;
            font-size: 13px; font-weight: 700;
            margin-bottom: 22px;
        }

        /* Ошибка */
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }

        /* Поля ввода цифр */
        .code-input-wrapper {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 22px;
        }
        .code-input-wrapper input {
            width: 46px; height: 54px;
            border: 1.5px solid var(--border-medium);
            border-radius: var(--radius-md);
            font-size: 22px; font-weight: 700;
            text-align: center;
            outline: none;
            color: var(--text-primary);
            background: var(--bg-page);
            transition: border-color var(--transition), box-shadow var(--transition);
            font-family: var(--font-body);
        }
        .code-input-wrapper input:focus {
            border-color: var(--amber-500);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }
        .code-input-wrapper input.filled {
            border-color: var(--amber-400);
            background: var(--amber-50);
        }

        #hidden-code { display: none; }

        /* Кнопка подтвердить */
        .btn-confirm {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px 20px;
            background: var(--accent-gradient);
            color: #111;
            border: none; border-radius: var(--radius-full);
            font-family: var(--font-body);
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(245,158,11,0.3);
            transition: all var(--transition);
            margin-bottom: 16px;
        }
        .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,0.4); }
        .btn-confirm:active { transform: scale(.97); }
        .btn-confirm:disabled {
            background: var(--gray-200);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Повторная отправка */
        .resend-section {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 6px;
        }
        #resend-btn {
            background: none; border: none;
            color: var(--amber-600);
            font-size: 13px; font-weight: 700;
            cursor: pointer; padding: 0;
            font-family: var(--font-body);
            transition: color var(--transition);
        }
        #resend-btn:hover { color: var(--amber-700); text-decoration: underline; }
        #resend-btn:disabled { color: var(--text-muted); cursor: not-allowed; text-decoration: none; }

        #resend-status {
            font-size: 13px; text-align: center;
            min-height: 18px; margin-bottom: 6px;
        }
        #resend-status.ok   { color: #15803d; }
        #resend-status.fail { color: #dc2626; }

        .back-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 16px;
        }
        .back-to-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color var(--transition);
        }
        .back-to-home:hover { color: var(--amber-600); }
    </style>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-content">
        <a href="/home" class="logo" style="text-decoration:none;">LinkA</a>
      </div>
    </div>
  </header>

  <div class="verify-page">

    <div class="back-wrap">
        <a href="/login" class="back-to-home">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <div class="verify-card">
        <div class="verify-header">
            <div class="verify-icon-wrap">
                <i class="fas fa-shield-alt"></i>
            </div>
            <div class="verify-title">Подтверждение входа</div>
            <div class="verify-subtitle">
                Мы отправили 6-значный код в ваш <strong>Telegram</strong>.<br>
                Введите его ниже для входа.
            </div>
        </div>

        <div class="verify-body">
            <div style="text-align:center;">
                <div class="timer-badge" id="timer">
                    <i class="fas fa-clock"></i> Код действует 5 минут
                </div>
            </div>

            {% if error %}
            <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form method="POST" action="/2fa/verify" id="verify-form">
                <div class="code-input-wrapper" id="digit-boxes">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                </div>
                <input type="hidden" name="code" id="hidden-code">
                <button type="submit" class="btn-confirm" id="submit-btn" disabled>
                    <i class="fas fa-check"></i> Подтвердить
                </button>
            </form>

            <div class="resend-section">
                Не получили код?
                <button id="resend-btn" onclick="resendCode()">Отправить снова</button>
            </div>
            <div id="resend-status"></div>

        </div>
    </div>

  </div><!-- /verify-page -->

<script>
const digits = document.querySelectorAll('.digit');
const hiddenCode = document.getElementById('hidden-code');
const submitBtn = document.getElementById('submit-btn');

digits.forEach((input, i) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '').slice(-1);
        if (input.value) {
            input.classList.add('filled');
            if (i < digits.length - 1) digits[i + 1].focus();
        } else {
            input.classList.remove('filled');
        }
        updateHidden();
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) {
            digits[i - 1].focus();
            digits[i - 1].value = '';
            digits[i - 1].classList.remove('filled');
            updateHidden();
        }
    });
    input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (pasted.length === 6) {
            digits.forEach((d, idx) => {
                d.value = pasted[idx] || '';
                d.classList.toggle('filled', !!d.value);
            });
            updateHidden();
            digits[5].focus();
        }
    });
});

function updateHidden() {
    const code = Array.from(digits).map(d => d.value).join('');
    hiddenCode.value = code;
    submitBtn.disabled = code.length !== 6;
}

// Таймер
let seconds = 300;
const timerEl = document.getElementById('timer');
const interval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
        clearInterval(interval);
        timerEl.innerHTML = '<i class="fas fa-times-circle"></i> Код истёк';
        timerEl.style.background = '#fef2f2';
        timerEl.style.color = '#dc2626';
        timerEl.style.borderColor = '#fca5a5';
        submitBtn.disabled = true;
        return;
    }
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    timerEl.innerHTML = `<i class="fas fa-clock"></i> Осталось ${m}:${s.toString().padStart(2,'0')}`;
}, 1000);

// Повторная отправка
let resendCooldown = 0;
async function resendCode() {
    if (resendCooldown > 0) return;
    const btn = document.getElementById('resend-btn');
    const status = document.getElementById('resend-status');
    btn.disabled = true;
    status.textContent = '';
    try {
        const resp = await fetch('/2fa/resend', { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
            status.textContent = '✅ Код отправлен повторно!';
            status.className = 'ok';
            seconds = 300;
        } else {
            status.textContent = '❌ ' + (data.error || 'Не удалось отправить');
            status.className = 'fail';
        }
    } catch(e) {
        status.textContent = 'Ошибка соединения';
        status.className = 'fail';
    }
    resendCooldown = 30;
    const coolTimer = setInterval(() => {
        resendCooldown--;
        btn.textContent = resendCooldown > 0 ? `Отправить снова (${resendCooldown}с)` : 'Отправить снова';
        if (resendCooldown <= 0) { clearInterval(coolTimer); btn.disabled = false; }
    }, 1000);
}

digits[0].focus();
</script>
<script src="{{ url_for('static', filename='defaults/notifications.js') }}"></script>
</body>
</html>
